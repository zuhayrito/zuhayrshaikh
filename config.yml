# =============================================================================
# linkyee — Site Configuration
# =============================================================================

# Theme — directory under ./themes/. Built-ins:
#   default | minimal-mono | editorial-serif | neo-brutalism
#   glassmorphism | terminal-retro | paper-card | newsprint
theme: glassmorphism

# HTML <html lang> attribute
lang: "en"

# Force a color scheme regardless of the visitor's system appearance:
#   auto  — follow OS (default; the page auto-switches between light/dark)
#   light — always render light mode
#   dark  — always render dark mode
color_scheme: dark

# -----------------------------------------------------------------------------
# Plugins 
# -----------------------------------------------------------------------------
# (I have temporarily disabled the advanced plugins so they don't load 
# the template creator's data on your site. We can add them back later if you want!)
plugins: []

# -----------------------------------------------------------------------------
# Tracking
# -----------------------------------------------------------------------------
google_analytics_id:

# -----------------------------------------------------------------------------
# Profile header
# -----------------------------------------------------------------------------
title: "Zuhayr's Links"
avatar: "./images/profile.jpeg"
name: "Zuhayr Shaikh"
tagline: >-
  Maker, ???, resident physician--anesthesiology

# -----------------------------------------------------------------------------
# Links
# -----------------------------------------------------------------------------
links:
  - link:
      icon: "fa-solid fa-link"
      text: "Portfolio website"
      url: "https://zs8zfm.wixsite.com/zuhayr-shaikh"
      alt: "Portfolio website"
      title: "Portfolio website"
      target: "_blank"

# -----------------------------------------------------------------------------
# Social media buttons
# -----------------------------------------------------------------------------
# (Currently empty - let me know which ones you want to add!)
socials: []

# -----------------------------------------------------------------------------
# Footer 
# -----------------------------------------------------------------------------
footer: >
  Hi there! Thanks for checking out my page.

copyright: >
